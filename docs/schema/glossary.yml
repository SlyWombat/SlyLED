- term: V4L2
  acronym: true
  en:
    short: Video for Linux 2
    long: The kernel video-capture API used by camera nodes (`cv2.VideoCapture` on
      Orange Pi / Raspberry Pi). SoC ISP video nodes like `sunxi-vin` and `bcm2835-isp`
      are filtered out — only regular USB cameras register.
