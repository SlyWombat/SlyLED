- term: reprojection RMS
  acronym: false
  en:
    short: null
    long: After solvePnP, project the 3D points back through the solved pose and measure
      the pixel distance to the detected corners. Reported as root-mean-square across
      all points. <2 px is excellent, 2–5 px is usable, >5 px means something is wrong.
  fr:
    short: null
    long: Après solvePnP, projeter les points 3D à travers la pose résolue et mesurer
      la distance en pixels jusqu'aux coins détectés. Rapporté comme la racine quadratique
      moyenne sur tous les points. <2 px est excellent, 2–5 px est utilisable, >5
      px signifie que quelque chose ne va pas.
  see_also:
  - Appendix A §A.4.
- term: RGB / RGBW
  acronym: true
  en:
    short: Red, Green, Blue [, White]
    long: Standard LED colour models. RGBW adds a dedicated white LED for purer whites.
  fr:
    short: Red, Green, Blue [, White]
    long: Modèles colorimétriques LED standard. RGBW ajoute une LED blanche dédiée
      pour des blancs plus purs.
  see_also:
  - §4 Fixture Setup.
- term: RMS
  acronym: true
  en:
    short: Root-Mean-Square
    long: Quadratic-mean aggregation of errors (`sqrt(mean(x²))`). More sensitive
      to outliers than a plain mean — which is why it's used as a calibration quality
      metric.
  fr:
    short: Root-Mean-Square
    long: Agrégation en moyenne quadratique des erreurs (`sqrt(mean(x²))`). Plus sensible
      aux valeurs aberrantes qu'une moyenne simple — c'est pourquoi elle est utilisée
      comme métrique de qualité d'étalonnage.
  see_also:
  - Appendix A §A.4.
- term: Rodrigues
  acronym: false
  en:
    short: null
    long: Mathematical conversion between a rotation vector (`rvec` from solvePnP)
      and a 3×3 rotation matrix. `cv2.Rodrigues()`.
  fr:
    short: null
    long: Conversion mathématique entre un vecteur de rotation (`rvec` issu de solvePnP)
      et une matrice de rotation 3×3. `cv2.Rodrigues()`.
  see_also:
  - Appendix A §A.4.
- term: RSSI
  acronym: true
  en:
    short: Received Signal Strength Indicator
    long: How strong a WiFi signal a performer is hearing. Reported in dBm; the orchestrator
      stores it as an unsigned magnitude so "69" means "−69 dBm".
  fr:
    short: Received Signal Strength Indicator
    long: La puissance du signal WiFi qu'un nœud exécutant entend. Rapportée en dBm
      ; l'orchestrateur la stocke comme une magnitude non signée, donc « 69 » signifie
      « −69 dBm ».
  see_also:
  - UDP protocol PONG payload.
- term: RTOS
  acronym: true
  en:
    short: Real-Time Operating System
    long: An OS with deterministic timing guarantees. Mbed OS on the Giga is an RTOS.
  fr:
    short: Real-Time Operating System
    long: Un OS avec des garanties de timing déterministes. Mbed OS sur la Giga est
      un RTOS.
  see_also:
  - CLAUDE.md hardware.
- term: runner
  acronym: false
  en:
    short: null
    long: A step sequencer loaded into a performer. Each step is an action (colour,
      pattern, LED range) with a duration; the runner loops the step list in sync
      with the orchestrator.
  fr:
    short: null
    long: Un séquenceur d'étapes chargé dans un nœud exécutant. Chaque étape est une
      action (couleur, motif, plage LED) avec une durée ; le runner boucle la liste
      d'étapes en synchronisation avec l'orchestrateur.
  see_also:
  - §4 Fixture Setup
  - §13 Preset Shows.
- term: RX / RY / RZ
  acronym: false
  en:
    short: null
    long: 'Rotations about the X, Y, Z axes of the stage frame, in degrees. In schema
      v2: `rx` = pitch, `ry` = roll, `rz` = yaw/pan. Never read `rotation[1]` or `rotation[2]`
      directly — always go through `rotation_from_layout()`.'
  fr:
    short: null
    long: 'Rotations autour des axes X, Y, Z du repère de la scène, en degrés. En
      schéma v2 : `rx` = pitch, `ry` = roll, `rz` = yaw/pan. Ne lisez jamais `rotation[1]`
      ou `rotation[2]` directement — passez toujours par `rotation_from_layout()`.'
  see_also:
  - Appendix A §A.9.
- term: sACN
  acronym: true
  en:
    short: Streaming ACN
    long: DMX-over-Ethernet alternative to Art-Net, defined by RFC 7724. SlyLED speaks
      both.
  fr:
    short: Streaming ACN
    long: Alternative DMX-sur-Ethernet à Art-Net, définie par la RFC 7724. SlyLED
      parle les deux.
  see_also:
  - §12 DMX Profiles.
- term: SCP
  acronym: true
  en:
    short: Secure Copy Protocol
    long: File transfer over SSH. How camera firmware reaches the Orange Pi / Raspberry
      Pi.
  fr:
    short: Secure Copy Protocol
    long: Transfert de fichiers sur SSH. Comment le firmware caméra atteint l'Orange
      Pi / Raspberry Pi.
  see_also:
  - §15 Firmware → Camera deploy.
- term: solvePnP
  acronym: false
  en:
    short: null
    long: See **PnP**.
  fr:
    short: null
    long: Voir **PnP**.
  see_also:
  - Appendix A §A.4.
- term: SPA
  acronym: true
  en:
    short: Single-Page Application
    long: The desktop orchestrator UI is one HTML page that loads JavaScript modules
      instead of navigating between pages.
  fr:
    short: Single-Page Application
    long: L'interface d'orchestrateur de bureau est une page HTML unique qui charge
      des modules JavaScript au lieu de naviguer entre pages.
  see_also:
  - §3 Platform Guide.
- term: SQPNP
  acronym: false
  en:
    short: null
    long: A specific solvePnP algorithm variant (`cv2.SOLVEPNP_SQPNP`) chosen because
      it tolerates fewer correspondences than the iterative solver.
  fr:
    short: null
    long: Une variante spécifique de l'algorithme solvePnP (`cv2.SOLVEPNP_SQPNP`)
      choisie parce qu'elle tolère moins de correspondances que le solveur itératif.
  see_also:
  - Appendix A §A.4.
- term: SRAM
  acronym: true
  en:
    short: Static Random-Access Memory
    long: The fast, volatile RAM on a microcontroller. Tight budget on the D1 Mini
      — the manual warns against String objects and heap allocation.
  fr:
    short: Static Random-Access Memory
    long: La RAM rapide et volatile d'un microcontrôleur. Budget serré sur le D1 Mini
      — le manuel met en garde contre les objets String et l'allocation sur le tas.
  see_also:
  - CLAUDE.md performance rules.
- term: SSH
  acronym: true
  en:
    short: Secure Shell
    long: Encrypted remote-login protocol. How the orchestrator reaches camera-node
      shells for firmware deployment.
  fr:
    short: Secure Shell
    long: Protocole de connexion distante chiffré. Comment l'orchestrateur atteint
      les shells des nœuds caméra pour le déploiement firmware.
  see_also:
  - §15 Firmware → Camera deploy.
- term: SVG
  acronym: true
  en:
    short: Scalable Vector Graphics
    long: Vector image format used by diagram exporters.
  fr:
    short: Scalable Vector Graphics
    long: Format d'image vectoriel utilisé par les exportateurs de diagrammes.
  see_also:
  - Appendix C.
- term: TCP
  acronym: true
  en:
    short: Transmission Control Protocol
    long: Reliable, connection-based networking. HTTP traffic (config pages, API calls)
      rides on TCP.
  fr:
    short: Transmission Control Protocol
    long: Réseau fiable, orienté connexion. Le trafic HTTP (pages de configuration,
      appels API) circule sur TCP.
  see_also:
  - UDP protocol discussion.
- term: tiling
  acronym: false
  en:
    short: null
    long: 'Sliced-Aided Hyper-Inference (SAHI)-style detection: break a large image
      into overlapping patches, run the detector on each, stitch results. Improves
      small-object detection accuracy at the cost of runtime. Controlled by the `tile`
      option on `/scan`.'
  fr:
    short: null
    long: 'Détection de style Sliced-Aided Hyper-Inference (SAHI) : découper une grande
      image en patchs qui se chevauchent, exécuter le détecteur sur chacun, recoudre
      les résultats. Améliore la précision de détection des petits objets au prix
      du temps d''exécution. Contrôlé par l''option `tile` de `/scan`.'
  see_also:
  - §14 Camera Nodes.
- term: TTL
  acronym: true
  en:
    short: Time-To-Live
    long: A timeout after which a resource (e.g. a mover claim) auto-expires. Mover-control
      claims have a 15 s TTL.
  fr:
    short: Time-To-Live
    long: Délai après lequel une ressource (p. ex. une réservation de projecteur motorisé)
      expire automatiquement. Les réservations de mover-control ont un TTL de 15 s.
  see_also:
  - Appendix B §B.7.
- term: UDP
  acronym: true
  en:
    short: User Datagram Protocol
    long: Connectionless, best-effort networking. Used for all orchestrator↔performer
      traffic (discovery, actions, runner control) because it's low-latency and the
      wire protocol tolerates occasional packet loss.
  fr:
    short: User Datagram Protocol
    long: Réseau sans connexion, au mieux. Utilisé pour tout le trafic orchestrateur↔nœud
      exécutant (découverte, actions, contrôle de runner) parce qu'il est à faible
      latence et que le protocole filaire tolère une perte occasionnelle de paquets.
  see_also:
  - Wire protocol
  - CLAUDE.md §UDP binary protocol.
- term: UI
  acronym: true
  en:
    short: User Interface
    long: —
  fr:
    short: User Interface
    long: —
  see_also:
  - Throughout.
- term: universe
  acronym: false
  en:
    short: null
    long: A DMX addressing space — 1–512 channels. A show typically spans multiple
      universes; Art-Net addresses them as `net.subnet.universe`.
  fr:
    short: null
    long: null
  see_also:
  - §12 DMX Profiles.
- term: URL
  acronym: true
  en:
    short: Uniform Resource Locator
    long: Web address.
  fr:
    short: Uniform Resource Locator
    long: Adresse web.
  see_also:
  - §14 Camera Nodes.
- term: USB
  acronym: true
  en:
    short: Universal Serial Bus
    long: —
  fr:
    short: Universal Serial Bus
    long: —
  see_also:
  - §15 Firmware USB flash.
- term: V4L2
  acronym: true
  en:
    short: Video for Linux 2
    long: The kernel video-capture API used by camera nodes (`cv2.VideoCapture` on
      Orange Pi / Raspberry Pi). SoC ISP video nodes like `sunxi-vin` and `bcm2835-isp`
      are filtered out — only regular USB cameras register.
  fr:
    short: Video for Linux 2
    long: L'API de capture vidéo du noyau utilisée par les nœuds caméra (`cv2.VideoCapture`
      sur Orange Pi / Raspberry Pi). Les nœuds vidéo SoC ISP comme `sunxi-vin` et
      `bcm2835-isp` sont filtrés — seules les caméras USB ordinaires s'enregistrent.
  see_also:
  - §14 Camera Nodes.
- term: WiFi
  acronym: false
  en:
    short: null
    long: 802.11 wireless networking. Performers and camera nodes join the orchestrator's
      LAN over WiFi.
  fr:
    short: null
    long: Réseau sans fil 802.11. Les nœuds exécutants et les nœuds caméra rejoignent
      le LAN de l'orchestrateur par WiFi.
  see_also:
  - §2 Walkthrough.
- term: WLED
  acronym: false
  en:
    short: null
    long: Popular open-source firmware for ESP32/8266-based LED controllers. SlyLED
      includes a bridge so WLED devices can appear as performers.
  fr:
    short: null
    long: Firmware open source populaire pour les contrôleurs LED à base d'ESP32/8266.
      SlyLED inclut un pont pour que les appareils WLED apparaissent comme des nœuds
      exécutants.
  see_also:
  - §4 Fixture Setup
  - '`desktop/shared/wled_bridge.py`.'
- term: WS2812B
  acronym: false
  en:
    short: null
    long: Common addressable-RGB LED chip (aka "NeoPixel"). The ESP32 RMT peripheral
      drives it in hardware; the D1 Mini bit-bangs it in software.
  fr:
    short: null
    long: Puce LED RGB adressable courante (alias « NeoPixel »). Le périphérique RMT
      de l'ESP32 la pilote en matériel ; le D1 Mini la bit-bang en logiciel.
  see_also:
  - §4 Fixture Setup.
- term: YOLO
  acronym: true
  en:
    short: You Only Look Once
    long: Single-pass object-detection neural network. SlyLED camera nodes run YOLOv8n
      via ONNX Runtime for person/object detection on `POST /scan`.
  fr:
    short: You Only Look Once
    long: Réseau neuronal de détection d'objets en une seule passe. Les nœuds caméra
      SlyLED exécutent YOLOv8n via ONNX Runtime pour la détection de personne/objet
      sur `POST /scan`.
  see_also:
  - §14 Camera Nodes.
- term: ZIP
  acronym: false
  en:
    short: null
    long: Archive file format, used for the release bundle.
  fr:
    short: null
    long: Format de fichier d'archive, utilisé pour le paquet de version.
  see_also:
  - §15 Firmware Registry.
