# Feature comparison — rendered into a sortable table on the website
# (#672) and referenced from the README (#676). Rows = competitors;
# columns = capabilities. Populate with honest, up-to-date facts; the
# "see" field links back to a source in the manual or an external
# reference.

products:
  - id: slyled
    name: SlyLED
    website: https://electricrv.ca/slyled
    price_approx_usd: 250
    price_notes: "1 moving head + 1 USB camera + Windows PC — hardware is incremental."
  - id: grandma3
    name: grandMA3 (onPC)
    website: https://www.malighting.com/grandma3
    price_approx_usd: 60000
    price_notes: "Full console pricing; onPC alone is cheaper but still desk-centric."
  - id: chamsys_magicq
    name: Chamsys MagicQ
    website: https://www.chamsys.co.uk/magicq
    price_approx_usd: 5000
    price_notes: "Software is free; hardware wings start around $2 k, full consoles around $10 k."
  - id: follow_me
    name: Follow-Me 3D
    website: https://www.follow-me.com/
    price_approx_usd: 15000
    price_notes: "Specialised tracking software; integrates with consoles."
  - id: zactrack
    name: Zactrack PRO
    website: https://www.zactrack.com/
    price_approx_usd: 30000
    price_notes: "UWB-beacon tracking system — beacons + puck + server."
  - id: qlcplus
    name: QLC+
    website: https://qlcplus.org/
    price_approx_usd: 50
    price_notes: "Free software + a USB-DMX dongle."
  - id: freestyler
    name: Freestyler DMX
    website: https://freestylerdmx.be/
    price_approx_usd: 50
    price_notes: "Free; Windows-only."

