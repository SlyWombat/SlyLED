<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A0F13;--surface:#0f172a;--surface2:#1e293b;--text:#e2e8f0;--dim:#94a3b8;--accent:#22d3ee;--green:#22cc66;--purple:#7c3aed;--blue:#0969DA;--orange:#f59e0b;--red:#ef4444}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden;background-image:linear-gradient(rgba(34,211,238,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,.02) 1px,transparent 1px);background-size:40px 40px}
h1,h2,h3{font-family:'Space Grotesk',sans-serif}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
.container{max-width:1000px;margin:0 auto;padding:0 20px}
.hero{padding:80px 0 60px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 50% 50%,rgba(9,105,218,.08) 0%,transparent 50%);animation:pulse 8s ease-in-out infinite;pointer-events:none}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.1);opacity:1}}
.hero img{height:90px;margin-bottom:20px;filter:drop-shadow(0 0 20px rgba(34,211,238,.3));animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0);filter:drop-shadow(0 0 20px rgba(34,211,238,.3))}50%{transform:translateY(-8px);filter:drop-shadow(0 0 30px rgba(34,211,238,.5))}}
.hero h1{font-size:3.5em;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--green),var(--purple));background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.02em;animation:shimmer 4s ease-in-out infinite}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.version-badge{display:inline-block;background:linear-gradient(135deg,var(--purple),var(--accent));color:#fff;font-size:.28em;padding:4px 12px;border-radius:20px;vertical-align:super;margin-left:10px;-webkit-text-fill-color:#fff;font-weight:700;letter-spacing:.02em}
.hero .tagline{font-size:1.35em;color:var(--dim);margin-top:12px;max-width:650px;margin-left:auto;margin-right:auto;text-shadow:0 0 30px rgba(34,211,238,.08)}
.badges{display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.badge{padding:6px 16px;border-radius:20px;font-size:.82em;font-weight:600;backdrop-filter:blur(8px)}
.badge-win{background:rgba(37,99,235,.15);color:#60a5fa;border:1px solid rgba(37,99,235,.3)}
.badge-android{background:rgba(34,204,102,.15);color:#4ade80;border:1px solid rgba(34,204,102,.3)}
.badge-esp{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
.badge-dmx{background:rgba(124,58,237,.15);color:#a78bfa;border:1px solid rgba(124,58,237,.3)}
.cta{display:flex;gap:14px;justify-content:center;margin-top:36px;flex-wrap:wrap}
.cta a{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:10px;font-weight:700;font-size:1em;transition:all .2s;box-shadow:0 4px 15px rgba(0,0,0,.3)}
.cta a:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.4);text-decoration:none}
.cta-primary{background:linear-gradient(135deg,var(--blue),var(--accent));color:#fff}
.cta-android{background:linear-gradient(135deg,#059669,var(--green));color:#000}
.cta-github{background:var(--surface2);color:var(--text);border:1px solid #334155}
.screenshots{padding:60px 0;background:linear-gradient(180deg,var(--bg),var(--surface))}
.screenshots h2{text-align:center;font-size:2em;margin-bottom:12px}
.screenshots .sub{text-align:center;color:var(--dim);margin-bottom:30px}
.ss-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
.ss-grid figure{margin:0;position:relative;overflow:hidden;border-radius:10px;border:1px solid #334155;transition:transform .2s}
.ss-grid figure:hover{transform:scale(1.02)}
.ss-grid img{width:100%;display:block;cursor:zoom-in}
.ss-grid figcaption{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.8));padding:10px 14px;font-size:.8em;color:var(--dim)}
section{padding:60px 0}
.section-title{font-size:2em;font-weight:700;text-align:center;margin-bottom:10px}
.section-sub{text-align:center;color:var(--dim);margin-bottom:36px;font-size:1.05em}
.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.feature{background:var(--surface);padding:28px;border-radius:12px;border:1px solid #334155;border-left:3px solid var(--accent);transition:all .3s;position:relative;overflow:hidden}
.feature:hover{border-left-color:var(--purple);background:linear-gradient(135deg,rgba(34,211,238,.04),transparent);box-shadow:0 4px 24px rgba(34,211,238,.08);text-decoration:none}
a.feature{color:inherit;text-decoration:none;display:block;cursor:pointer}
.feature h3{color:var(--accent);margin-bottom:10px;font-size:1.1em}
.feature p{color:var(--dim);font-size:.9em;line-height:1.5}
.feature .icon{font-size:2.2em;margin-bottom:12px;display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:50%;background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.15)}
.hw-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.hw-card{background:var(--surface);padding:24px;border-radius:12px;border:1px solid #334155;text-align:center;transition:border-color .2s}
.hw-card:hover{border-color:var(--accent)}
.hw-card h3{margin-bottom:8px;font-size:1em}
.hw-card p{color:var(--dim);font-size:.85em}
.community{background:linear-gradient(135deg,rgba(124,58,237,.08),rgba(34,211,238,.05));padding:60px 0}
.comm-card{text-align:center;padding:40px;background:var(--surface);border-radius:16px;border:1px solid rgba(124,58,237,.3);max-width:500px;margin:0 auto}
.comm-card .num{font-size:3.5em;font-weight:800;background:linear-gradient(135deg,var(--purple),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.install{background:var(--surface)}
.install-steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-top:30px}
.step{padding:24px;border-radius:12px;border:1px solid #334155;background:var(--bg)}
.step .num{display:inline-block;width:32px;height:32px;line-height:32px;text-align:center;border-radius:50%;background:var(--blue);color:#fff;font-weight:700;font-size:.9em;margin-bottom:12px}
.step h4{margin-bottom:8px}
.step p{color:var(--dim);font-size:.88em}
.step code{background:#1e293b;padding:2px 6px;border-radius:3px;font-size:.85em;color:var(--accent)}
footer{padding:40px 0;text-align:center;color:var(--dim);font-size:.85em;border-top:1px solid #1e293b}
footer a{color:var(--accent)}
.lang-btn{position:fixed;top:16px;right:16px;z-index:100;background:var(--surface2);border:1px solid #334155;border-radius:8px;padding:6px 12px;color:var(--dim);cursor:pointer;font-size:.85em;display:flex;align-items:center;gap:6px;transition:border-color .2s}
.lang-btn:hover{border-color:var(--accent);color:var(--text)}
.lang-btn svg{width:16px;height:16px;fill:currentColor}
.hero-screenshot{perspective:800px;margin-bottom:24px}
.hero-screenshot img{width:100%;border-radius:12px;border:1px solid #334155;transition:transform .4s;box-shadow:0 8px 40px rgba(0,0,0,.5);cursor:zoom-in}
.hero-screenshot:hover img{transform:rotateY(-2deg) rotateX(1deg) scale(1.01)}
.lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);z-index:200;display:none;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.active{display:flex}
.lightbox img{max-width:95%;max-height:90vh;border-radius:8px;box-shadow:0 0 60px rgba(34,211,238,.2)}
.lightbox .close{position:absolute;top:20px;right:24px;color:#fff;font-size:2em;cursor:pointer;z-index:201}
.fade-in{opacity:0;transform:translateY(20px);transition:opacity .6s,transform .6s}
.fade-in.visible{opacity:1;transform:translateY(0)}
@media(max-width:600px){.hero h1{font-size:2.2em}.hero .tagline{font-size:1em}.section-title{font-size:1.5em}
.ss-grid{grid-template-columns:1fr}.lang-btn{top:8px;right:8px;font-size:.75em;padding:4px 8px}}
</style>
</head>

var _lang=localStorage.getItem('slyled-lang')||'en';
function _applyLang(){
  var t=I[_lang]||I.en;
  document.querySelectorAll('[data-i]').forEach(function(el){
    var k=el.getAttribute('data-i');
    if(t[k]!==undefined) el.innerHTML=t[k];
  });
  document.documentElement.lang=_lang;
  var lb=document.getElementById('lang-label');
  if(lb) lb.textContent=_lang.toUpperCase();
  // Switch manual PDF link based on language
  var manualPdf=_lang==='fr'?'SlyLED_User_Manual_fr.pdf':'SlyLED_User_Manual.pdf';
  document.querySelectorAll('a[href*="User_Manual"]').forEach(function(a){a.href=manualPdf;});
  document.title=_lang==='fr'?'SlyLED \u2014 Contr\u00f4le d\u2019\u00e9clairage LED et DMX volumétrique 3D':'SlyLED \u2014 3D Volumetric LED & DMX Lighting Control';
}
function _toggleLang(){
  _lang=_lang==='en'?'fr':'en';
  localStorage.setItem('slyled-lang',_lang);
  _applyLang();
}
_applyLang();

fetch('https://electricrv.ca/api/profiles/index.php?action=stats')
  .then(function(r){return r.json();}).then(function(d){if(d&&d.data)document.getElementById('comm-count').textContent=d.data.total;}).catch(function(){});

// ── Lightbox ─────────────────────────────────────────────────────────
document.querySelectorAll('.ss-grid img').forEach(function(img){
  img.onclick=function(e){
    e.stopPropagation();
    document.getElementById('lb-img').src=this.src;
    document.getElementById('lightbox').classList.add('active');
  };
});
document.addEventListener('keydown',function(e){if(e.key==='Escape')document.getElementById('lightbox').classList.remove('active');});

// ── Scroll animations ────────────────────────────────────────────────
var obs=new IntersectionObserver(function(entries){
  entries.forEach(function(e){if(e.isIntersecting)e.target.classList.add('visible');});
},{threshold:0.1});
document.querySelectorAll('.fade-in').forEach(function(el){obs.observe(el);});
</script>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('active')">
  <span class="close">&times;</span>
  <img id="lb-img" src="" alt="">
</div>

</body>
